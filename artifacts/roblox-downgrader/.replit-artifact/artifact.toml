kind = "web"
previewPath = "/"
title = "Roblox Downgrader"
version = "1.0.0"
id = "artifacts/roblox-downgrader"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20960

[services.development]
run = "pnpm --filter @workspace/roblox-downgrader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/roblox-downgrader", "run", "build" ]
publicDir = "artifacts/roblox-downgrader/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20960"
BASE_PATH = "/"
