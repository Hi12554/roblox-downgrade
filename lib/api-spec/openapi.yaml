openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Roblox Deployment Downloader API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: roblox
    description: Roblox CDN proxy
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /client-version:
    get:
      operationId: getClientVersion
      tags: [roblox]
      summary: Get current Roblox version hash
      description: Proxies clientsettings.roblox.com to avoid CORS
      parameters:
        - name: binaryType
          in: query
          required: true
          schema:
            type: string
            enum: [WindowsPlayer, WindowsStudio64, MacPlayer, MacStudio]
        - name: channel
          in: query
          required: false
          schema:
            type: string
            default: LIVE
      responses:
        "200":
          description: Version info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientVersionResponse"
        "500":
          description: Failed to fetch version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
    ClientVersionResponse:
      type: object
      required: [version, clientVersionUpload]
      properties:
        version:
          type: string
          description: Version hash (e.g. version-abc123def456)
        clientVersionUpload:
          type: string
        bootstrapperVersion:
          type: ["string", "null"]
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
